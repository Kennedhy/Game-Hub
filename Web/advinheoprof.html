<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Jogo — Era da Trivia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="cabecalho">
<a href="index.html" class="logo">

    <span class="texto-logo">ERA DA TRIVIA</span>
</a>
<div class="direita-cabecalho">
    <div class="emblema-usuario">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M20 21a8 8 0 1 0-16 0"/>
    </svg>
    <span id="nome-cabecalho">—</span>
    </div>
    <button class="btn-sair" id="btn-sair">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    <span>SAIR</span>
    </button>
</div>
    </header>

  <main class="pagina-jogo">
    <div class="card-inicio">
     <h1 class="brilho-rosa">QUEM É ESSE PROFESSOR?</h1>

     <div class="container-imagem-jogo">
       <img id="imagem-nitida" src="assets/img/felipe.jpeg" alt="Adivinhe a pessoa">
       <canvas id="canvas-borrado"></canvas>
     </div>
    
        
    <div class="grupo-campo">
      <input type="text" id="palpite-professor" placeholder="Digite o nome do professor...">
    </div>
    
    <!-- Botão de palpite -->
    <button class="btn-primario" id="btn-palpite">ENVIAR PALPITE</button>
  </div>

      
    </div>

  </main>

  <script src="script.js"></script>
  <script src="advinheoprof.js"></script> <!-- A lógica específica deste jogo -->
</body>
</html>
