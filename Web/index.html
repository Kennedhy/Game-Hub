<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Era da Trivia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="cabecalho">
    <a href="index.html" class="logo">

      <span class="texto-logo">ERA DA TRIVIA</span>
    </a>
    <div class="direita-cabecalho">
      <div class="emblema-usuario">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"/>
          <path d="M20 21a8 8 0 1 0-16 0"/>
        </svg>
        <span id="nome-cabecalho">—</span>
      </div>
      <button class="btn-sair" id="btn-sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>SAIR</span>
      </button>
    </div>
  </header>

  <main>

    <section class="secao-jogos">
      <div class="container">
        <div class="cabecalho-secao">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--rosa)">
            <rect x="6" y="11" width="12" height="9" rx="2"/>
            <path d="M6 11V7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4"/>
          </svg>
          <h2 class="brilho-rosa">ESCOLHA SEU JOGO</h2>
          <div class="linha-secao"></div>
        </div>

        <div class="grade-jogos">

          <a href="advinheoprof.html" class="card-jogo rosa">
            <div class="icone-jogo rosa">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
            </div>
          </a>

          <div class="card-jogo ciano" data-jogo="">
            <div class="icone-jogo ciano">
                
            </div>
          </div>

          <div class="card-jogo amarelo" data-jogo="">
            <div class="icone-jogo amarelo">

            </div>
          </div>

          <div class="card-jogo roxo" data-jogo="">
            <div class="icone-jogo roxo">

            </div>
          </div>

          <div class="card-jogo verde" data-jogo="">
            <div class="icone-jogo verde">

            </div>
          </div>

        </div>
      </div>
    </section>

    <section class="secao-ranking" id="ranking">
      <div class="container">
        <div class="cabecalho-secao">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--amarelo)">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
            <path d="M4 22h16"/>
            <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
            <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
            <path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
          </svg>
          <h2 class="brilho-amarelo">TOP JOGADORES</h2>
          <div class="linha-secao amarelo"></div>
        </div>

        <div class="tabela-ranking">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>JOGADOR</th>
                <th>PONTOS</th>
              </tr>
            </thead>
            <tbody id="corpo-ranking"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="secao-posicao">
      <div class="container">
        <div class="cabecalho-secao">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ciano)">
            <circle cx="12" cy="8" r="4"/>
            <path d="M20 21a8 8 0 1 0-16 0"/>
          </svg>
          <h2 class="brilho-ciano">SUA POSIÇÃO</h2>
          <div class="linha-secao ciano"></div>
        </div>

        <div class="card-posicao">
          <div class="esquerda-posicao">
            <div class="rank-posicao" id="meu-rank">--</div>
            <div class="info-posicao">
              <p id="meu-nome">—</p>
              <p id="meus-pontos">0 PONTOS</p>
            </div>
          </div>
          <div class="meta-posicao" id="meta-posicao" style="display:none">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
              <polyline points="17 6 23 6 23 12"/>
            </svg>
            <span id="texto-meta"></span>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="rodape">
    <p>&copy; 2026 ERA DA TRIVIA INC.</p>
  </footer>

  <script src="script.js"></script>
  <script src="index.js"></script>
</body>
</html>
